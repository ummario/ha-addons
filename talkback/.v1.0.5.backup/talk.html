<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Talkback — Campainha</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #111; color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
    }
    .stack {
      min-height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 32px; box-sizing: border-box;
    }
    h1 { font-size: 18px; font-weight: 400; opacity: 0.6; margin: 0; }
    #btn {
      width: 200px; height: 200px; border-radius: 50%;
      border: 4px solid #333; background: #1a1a1a; color: #eee;
      font-size: 16px; font-weight: 500; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      transition: all .2s ease;
    }
    #btn .icon { font-size: 48px; line-height: 1; }
    #btn .label { font-size: 13px; opacity: 0.7; letter-spacing: 1px; text-transform: uppercase; }
    #btn.active {
      background: #1a3a1a; border-color: #2d7a2d;
      box-shadow: 0 0 30px rgba(45,122,45,0.4);
    }
    #btn.sending { background: #1a2a3a; border-color: #2d5b7a; }
    .pill {
      padding: 4px 12px; border-radius: 999px; font-size: 12px;
      border: 1px solid #333; background: #1a1a1a;
    }
    .pill.ok { border-color: #2d7a2d; background: #1a3a1a; }
    .pill.err { border-color: #7a2d2d; background: #3a1a1a; }
    #log {
      width: 100%; max-width: 480px; background: #0a0a0a;
      border: 1px solid #1a1a1a; border-radius: 8px;
      padding: 10px; font-family: ui-monospace, monospace;
      font-size: 11px; line-height: 1.6;
      overflow-y: auto; max-height: 160px; color: #666;
    }
    .row { display: flex; gap: 8px; align-items: center; }
  </style>
</head>
<body>
<div class="stack">
  <h1>Campainha Entrada</h1>
  <button id="btn" onclick="toggleTalk()">
    <span class="icon">🎤</span>
    <span class="label" id="btn-label">Falar</span>
  </button>
  <div class="row">
    <span class="pill" id="status-pill">pronto</span>
    <span class="pill" id="health-pill">a ligar...</span>
  </div>
  <div id="log"></div>
</div>

<script>
const btn = document.getElementById('btn');
const btnLabel = document.getElementById('btn-label');
const statusPill = document.getElementById('status-pill');
const healthPill = document.getElementById('health-pill');
const logEl = document.getElementById('log');

let isActive = false;
let stream = null;
let chunkInterval = null;
let mediaRecorder = null;
let currentChunks = [];

// Detectar base path (funciona tanto em ingress do HA como standalone)
const BASE = (() => {
  const p = window.location.pathname;
  // Se estiver em ingress, o path é /api/hassio_ingress/xxxx/
  const m = p.match(/^(\/api\/hassio_ingress\/[^/]+)/);
  return m ? m[1] : '';
})();

function addLog(msg, color) {
  const t = new Date().toLocaleTimeString('pt-PT');
  const line = document.createElement('div');
  line.textContent = `${t}  ${msg}`;
  if (color) line.style.color = color;
  logEl.prepend(line);
  if (logEl.children.length > 20) logEl.removeChild(logEl.lastChild);
}

async function refreshHealth() {
  try {
    const r = await fetch(`${BASE}/health`);
    const h = await r.json();
    healthPill.className = 'pill ' + (h.connected ? 'ok' : (h.mock ? '' : 'err'));
    healthPill.textContent = h.mock
      ? 'MOCK'
      : (h.connected ? '● ' + (h.camera_name || 'ligado') : '○ desligado');
  } catch {
    healthPill.className = 'pill err';
    healthPill.textContent = '○ offline';
  }
}
refreshHealth();
setInterval(refreshHealth, 15000);

async function toggleTalk() {
  if (!isActive) await startTalking();
  else stopTalking();
}

async function startTalking() {
  try {
    if (!stream) {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 48000 }
      });
      addLog('microfone ligado', '#4a4');
    }
  } catch(e) {
    addLog('ERRO mic: ' + e.message, '#a44');
    statusPill.textContent = 'erro mic';
    return;
  }
  isActive = true;
  btn.classList.add('active');
  btnLabel.textContent = 'A falar';
  statusPill.textContent = 'a gravar...';
  addLog('talkback LIGADO', '#4a4');
  sendChunk();
  chunkInterval = setInterval(sendChunk, 3000);
}

function stopTalking() {
  isActive = false;
  clearInterval(chunkInterval);
  chunkInterval = null;
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  btn.classList.remove('active', 'sending');
  btnLabel.textContent = 'Falar';
  statusPill.textContent = 'pronto';
  addLog('talkback DESLIGADO', '#666');
}

function sendChunk() {
  if (!isActive || !stream) return;
  const mime = ['audio/webm;codecs=opus','audio/webm','audio/mp4','']
    .find(m => !m || MediaRecorder.isTypeSupported(m)) || '';
  currentChunks = [];
  const mr = mime
    ? new MediaRecorder(stream, { mimeType: mime, audioBitsPerSecond: 64000 })
    : new MediaRecorder(stream);
  mr.ondataavailable = e => { if (e.data.size > 0) currentChunks.push(e.data); };
  mr.onstop = async () => {
    if (!currentChunks.length) return;
    const blob = new Blob(currentChunks, { type: mr.mimeType || 'audio/webm' });
    if (blob.size < 500) return;
    try {
      btn.classList.add('sending');
      const r = await fetch(`${BASE}/push`, {
        method: 'POST',
        headers: { 'Content-Type': blob.type },
        body: blob,
      });
      btn.classList.remove('sending');
      if (r.ok) {
        addLog('chunk ok (' + (blob.size/1024).toFixed(1) + ' KB)', '#4a4');
        if (isActive) statusPill.textContent = 'a gravar...';
      } else {
        addLog('ERRO ' + r.status, '#a44');
      }
    } catch(e) {
      btn.classList.remove('sending');
      addLog('ERRO: ' + e.message, '#a44');
    }
  };
  mediaRecorder = mr;
  mr.start();
  setTimeout(() => { if (mr.state === 'recording') mr.stop(); }, 2800);
}
</script>
</body>
</html>
