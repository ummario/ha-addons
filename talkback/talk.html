<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Talkback Campainha</title>
<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; }
body {
  margin: 0; padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
  background: #0c0d10; color: #eaeaea;
  font: 16px/1.5 -apple-system, system-ui, sans-serif;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh;
}
h1 { font-size: 22px; margin: 24px 0 8px; }
.sub { color: #8c8f96; font-size: 14px; margin-bottom: 24px; }

.btn {
  appearance: none; border: none; cursor: pointer;
  width: 200px; height: 200px; border-radius: 50%;
  font-size: 18px; font-weight: 600; color: #fff;
  background: #2563eb; transition: transform .1s, background .15s;
  display: flex; align-items: center; justify-content: center;
  margin: 16px 0; box-shadow: 0 8px 32px rgba(37,99,235,.25);
}
.btn:active { transform: scale(.97); }
.btn[data-state="recording"] { background: #dc2626; animation: pulse 1.4s infinite; }
.btn[data-state="connecting"] { background: #6b7280; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,.55); }
  50%      { box-shadow: 0 0 0 24px rgba(220,38,38,0); }
}

.status {
  margin: 16px 0; padding: 10px 16px; border-radius: 8px;
  background: #1a1c22; font-size: 13px; min-height: 38px;
  display: flex; align-items: center; justify-content: center; min-width: 240px;
  text-align: center;
}
.status.error { background: #3a1a1a; color: #fca5a5; }
.status.ok    { background: #14271c; color: #86efac; }

.diag {
  margin-top: 24px; padding: 12px 16px; border-radius: 8px;
  background: #14161b; font: 11px/1.5 ui-monospace, monospace; color: #a8a8ad;
  white-space: pre-wrap; word-break: break-all; max-width: 480px; width: 100%;
  max-height: 220px; overflow-y: auto;
}
.diag b { color: #fff; }

footer { margin: 32px 0 8px; font-size: 12px; color: #555; }
</style>
</head>
<body>

<h1>Campainha</h1>
<div class="sub">Push-to-talk · v2.0.2 (WS+PCM)</div>

<button id="btn" class="btn" data-state="idle">🎤 Falar</button>

<div id="status" class="status">Pronto</div>

<details style="margin-top:24px;width:100%;max-width:480px;">
  <summary style="cursor:pointer;font-size:12px;color:#666;">Diagnóstico</summary>
  <div id="diag" class="diag"></div>
</details>

<footer>UniFi Protect G6 · Talkback HA Add-on</footer>

<script>
// ------- AudioWorklet inline (downsample 48k→24k + s16le) -------
const WORKLET_CODE = `
class PCM24Worklet extends AudioWorkletProcessor {
  constructor() {
    super();
    // Buffer de acumulação a 48kHz para downsample x2
    this._inBuf = new Float32Array(0);
    // Frame size de saída em samples a 24kHz: ~20ms = 480 samples
    this._outFrameSamples = 480;
  }
  process(inputs) {
    const input = inputs[0];
    if (!input || input.length === 0) return true;
    const ch0 = input[0]; // mono
    if (!ch0 || ch0.length === 0) return true;

    // Concatenar com buffer existente
    const combined = new Float32Array(this._inBuf.length + ch0.length);
    combined.set(this._inBuf, 0);
    combined.set(ch0, this._inBuf.length);

    // Downsample 48k→24k: média de pares
    const outLen = Math.floor(combined.length / 2);
    if (outLen >= this._outFrameSamples) {
      // Quantos frames cabem
      const totalOutSamples = Math.floor(outLen / this._outFrameSamples) * this._outFrameSamples;
      const out = new Int16Array(totalOutSamples);
      for (let i = 0; i < totalOutSamples; i++) {
        const a = combined[i * 2];
        const b = combined[i * 2 + 1];
        const avg = (a + b) * 0.5;
        // Float [-1,1] → int16
        const clamped = Math.max(-1, Math.min(1, avg));
        out[i] = clamped < 0 ? clamped * 32768 : clamped * 32767;
      }
      // Resto do buffer (samples 48k não consumidos)
      const consumedIn = totalOutSamples * 2;
      this._inBuf = combined.slice(consumedIn);
      this.port.postMessage(out.buffer, [out.buffer]);
    } else {
      this._inBuf = combined;
    }
    return true;
  }
}
registerProcessor('pcm24', PCM24Worklet);
`;

const $btn = document.getElementById('btn');
const $status = document.getElementById('status');
const $diag = document.getElementById('diag');

let state = 'idle'; // idle | connecting | recording
let ws = null;
let audioCtx = null;
let micStream = null;
let workletNode = null;
let micSource = null;
let bytesSent = 0;

function setStatus(text, kind = '') {
  $status.textContent = text;
  $status.className = 'status' + (kind ? ' ' + kind : '');
}

function diagLog(line) {
  const t = new Date().toLocaleTimeString();
  $diag.textContent += `[${t}] ${line}\n`;
  $diag.scrollTop = $diag.scrollHeight;
}

function setBtn(s) {
  state = s;
  $btn.dataset.state = s;
  if (s === 'idle')        $btn.textContent = '🎤 Falar';
  else if (s === 'connecting') $btn.textContent = '⏳ A ligar...';
  else if (s === 'recording')  $btn.textContent = '🔴 A falar...';
}

async function start() {
  if (state !== 'idle') return;
  setBtn('connecting');
  setStatus('A ligar...', '');
  diagLog('start()');

  // 1. Pedir mic
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        channelCount: 1,
      },
      video: false,
    });
    diagLog('mic OK');
  } catch (e) {
    diagLog('mic ERROR: ' + e.message);
    setStatus('Sem permissão de microfone', 'error');
    setBtn('idle');
    return;
  }

  // 2. AudioContext + Worklet
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({
      sampleRate: 48000,
    });
    diagLog('AudioContext ' + audioCtx.sampleRate + 'Hz');

    const blob = new Blob([WORKLET_CODE], { type: 'application/javascript' });
    const url = URL.createObjectURL(blob);
    await audioCtx.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);

    workletNode = new AudioWorkletNode(audioCtx, 'pcm24');
    micSource = audioCtx.createMediaStreamSource(micStream);
    micSource.connect(workletNode);
    // não ligamos ao destination — não queremos eco local
    diagLog('worklet OK');
  } catch (e) {
    diagLog('audio setup ERROR: ' + e.message);
    setStatus('Erro audio: ' + e.message, 'error');
    cleanup();
    setBtn('idle');
    return;
  }

  // 3. WebSocket
  const wsUrl = (location.protocol === 'https:' ? 'wss:' : 'ws:')
    + '//' + location.host + (location.pathname.replace(/\/$/, '')) + '/ws';
  diagLog('WS connect: ' + wsUrl);

  try {
    ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';
  } catch (e) {
    diagLog('WS ERROR: ' + e.message);
    setStatus('Erro WS', 'error');
    cleanup();
    setBtn('idle');
    return;
  }

  ws.onopen = () => {
    diagLog('WS open');
  };

  ws.onmessage = (ev) => {
    if (typeof ev.data !== 'string') return;
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    diagLog('WS msg: ' + JSON.stringify(msg));
    if (msg.event === 'ready') {
      // Servidor pronto — começar a enviar PCM
      bytesSent = 0;
      workletNode.port.onmessage = (e) => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(e.data);
          bytesSent += e.data.byteLength;
        }
      };
      setBtn('recording');
      setStatus('A falar — clique para parar', 'ok');
    } else if (msg.event === 'error') {
      setStatus('Erro: ' + msg.msg, 'error');
      stop();
    }
  };

  ws.onerror = (e) => {
    diagLog('WS error');
  };

  ws.onclose = (ev) => {
    diagLog('WS close code=' + ev.code + ' reason=' + (ev.reason || '-'));
    if (state === 'recording') {
      setStatus('Ligação fechada', '');
    }
    cleanup();
    setBtn('idle');
  };
}

function stop() {
  if (state === 'idle') return;
  diagLog('stop() — bytes enviados: ' + bytesSent);
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.close(1000, 'user stop');
  }
  cleanup();
  setBtn('idle');
  setStatus('Parou', '');
}

function cleanup() {
  if (workletNode) {
    try { workletNode.port.onmessage = null; } catch {}
    try { workletNode.disconnect(); } catch {}
    workletNode = null;
  }
  if (micSource) {
    try { micSource.disconnect(); } catch {}
    micSource = null;
  }
  if (audioCtx) {
    try { audioCtx.close(); } catch {}
    audioCtx = null;
  }
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
  if (ws) {
    try { ws.close(); } catch {}
    ws = null;
  }
}

$btn.addEventListener('click', () => {
  if (state === 'idle') start();
  else stop();
});

// Diagnóstico inicial
diagLog('protocol=' + location.protocol);
diagLog('isSecureContext=' + window.isSecureContext);
diagLog('mediaDevices=' + (navigator.mediaDevices ? 'yes' : 'NO'));
diagLog('UA=' + navigator.userAgent.slice(0, 80));
</script>

</body>
</html>
